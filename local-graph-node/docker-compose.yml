services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: anvil
    command: ["--host", "0.0.0.0", "--chain-id", "31337"]
    ports:
      - '8545:8545'

  graph-node:
    image: graphprotocol/graph-node:v0.35.0
    ports:
      - '8000:8000'
      - '8001:8001'
      - '8020:8020'
      - '8030:8030'
      - '8040:8040'
    depends_on:
      - ipfs
      - postgres
      - anvil
    environment:
      postgres_host: postgres
      postgres_user: graph-node
      postgres_pass: let-me-in
      postgres_db: graph-node
      ipfs: 'ipfs:5001'
      ethereum: 'mainnet:http://anvil:8545'
      GRAPH_LOG: info

  ipfs:
    image: ipfs/go-ipfs:v0.4.22
    ports:
      - '5001:5001'
    volumes:
      - ipfs-data:/data/ipfs

  postgres:
    image: postgres:14
    command: ["postgres", "-cshared_preload_libraries=pg_stat_statements"]
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: graph-node
      POSTGRES_PASSWORD: let-me-in
      POSTGRES_DB: graph-node
      POSTGRES_INITDB_ARGS: "--locale=C --encoding=UTF8"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
  ipfs-data: